  <text x="132" y="790" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Build Knowledge Base</text>
  <text x="472" y="126" fill="#F8FAFC" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">DocMind - RAG Document Q&amp;A</text>
  <text x="472" y="172" fill="#94A3B8" font-size="24" font-family="Arial, Helvetica, sans-serif">Ask questions about uploaded documents and inspect grounded source chunks.</text>
  <rect x="472" y="228" width="272" height="152" rx="22" fill="#142033" stroke="#2E4A6A"/>
  <rect x="768" y="228" width="272" height="152" rx="22" fill="#142033" stroke="#2E4A6A"/>
