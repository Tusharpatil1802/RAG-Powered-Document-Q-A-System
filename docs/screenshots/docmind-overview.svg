  <text x="500" y="284" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Step 1</text>
  <text x="500" y="322" fill="#93C5FD" font-size="22" font-family="Arial, Helvetica, sans-serif">Enter API key</text>
  <text x="796" y="284" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Step 2</text>
  <text x="796" y="322" fill="#93C5FD" font-size="22" font-family="Arial, Helvetica, sans-serif">Upload files</text>
  <text x="1092" y="284" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Step 3</text>
  <text x="1092" y="322" fill="#93C5FD" font-size="22" font-family="Arial, Helvetica, sans-serif">Build and ask</text>
  <rect x="472" y="424" width="864" height="188" rx="24" fill="#0F172A" stroke="#243041"/>
  <text x="504" y="470" fill="#F8FAFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Suggested questions</text>
  <text x="504" y="522" fill="#CBD5E1" font-size="22" font-family="Arial, Helvetica, sans-serif">- What are the main responsibilities described in this document?</text>
  <text x="504" y="558" fill="#CBD5E1" font-size="22" font-family="Arial, Helvetica, sans-serif">- Which sections mention employee leave or onboarding?</text>
  <text x="504" y="594" fill="#CBD5E1" font-size="22" font-family="Arial, Helvetica, sans-serif">- Compare the key points across the uploaded files.</text>
